name: Deploy Atlas Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-atlas-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Check secrets are set
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "EC2_HOST is EMPTY"; else echo "EC2_HOST is set (length ${{ secrets.EC2_HOST && '?' || '0' }})"; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then echo "EC2_USER is EMPTY"; else echo "EC2_USER is set"; fi
          if [ -z "${{ secrets.EC2_KEY }}" ]; then echo "EC2_KEY is EMPTY"; else echo "EC2_KEY is set"; fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /opt/atlas
            git pull origin main
            source venv/bin/activate
            pip install -r backend/requirements.txt --quiet
            sudo supervisorctl restart atlas-api
